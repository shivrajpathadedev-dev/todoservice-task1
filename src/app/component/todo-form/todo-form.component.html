

<mat-card class="mt-4">
    <div class="card">
        <div class="card-body">
            <h2>{{isInEditMode? 'Update Todo' : 'Add Todo'}}</h2>
            <form #toodform="ngForm" (ngSubmit)="Ontodosubmit()">
               <div class="form-group">
                 <label for="TodoItem">TodoItem</label>
                <input
                    name="TodoItem"
                    required
                    ngModel
                type="text" class="form-control" #TodoItem>
               </div>
               <div class="form-group">
                <button

                *ngIf="!isInEditMode"
                mat-raised-button color="primary" class="w-100">Add Todo</button>
                <button 
                *ngIf="isInEditMode"
                (click)="OnUpdateTodo()"
                mat-raised-button color="warn" class="w-100">Update Todo</button>
               </div>
            </form>
        </div>
    </div>
</mat-card>
